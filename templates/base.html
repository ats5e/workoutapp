<!DOCTYPE html>
<html lang="en" class="h-full bg-[#030712]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Iron Log">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/app-icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/app-icon.svg') }}">
    <title>{% block title %}Iron Log{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        display: ['"Space Grotesk"', 'Inter', 'sans-serif']
                    },
                    colors: {
                        accent: {
                            DEFAULT: '#0ea5e9', // Electric Cyan
                            glow: '#38bdf8',
                            dim: '#0369a1'
                        },
                        surface: {
                            100: '#1f2937',
                            200: '#111827',
                            300: '#030712'
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(14, 165, 233, 0.5)',
                        'neon-intense': '0 0 25px rgba(14, 165, 233, 0.8)',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=2) }}">
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='service-worker.js') }}");
            });
        }
    </script>
    <style>
        /* Tech specific styling */
        .glass-panel {
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }
        .tech-gradient-text {
            background: linear-gradient(135deg, #fff 0%, #9ca3af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="h-full font-sans text-slate-300 antialiased selection:bg-accent/40 overscroll-none bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-surface-200 via-surface-300 to-black">
    <div class="min-h-full flex flex-col relative" style="padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);">
        <!-- Cyber grid background overlay -->
        <div class="pointer-events-none absolute inset-0 z-0 opacity-10" style="background-image: linear-gradient(to right, #4f4f4f 1px, transparent 1px), linear-gradient(to bottom, #4f4f4f 1px, transparent 1px); background-size: 40px 40px;"></div>

        <header class="sticky top-0 z-20 backdrop-blur-xl bg-surface-300/80 border-b border-white/5">
            <div class="mx-auto py-4 flex items-center justify-between relative z-10" style="width: min(calc(100vw - 2rem), 34rem); max-width: calc(100vw - 2rem);">
                <a href="{{ url_for('index') }}" class="flex items-center gap-3 group">
                    <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-surface-200 border border-accent/30 shadow-neon transition-all duration-300 group-hover:shadow-neon-intense group-hover:border-accent">
                        <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5 text-accent" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M4 8l2-2M16 20l2-2M2 12l2 2M18 8l2-2M8 20l-2-2"/></svg>
                    </span>
                    <span class="font-display text-xl font-bold tracking-tight text-white group-hover:text-accent transition-colors">Iron Log</span>
                </a>
                {% block header_right %}{% endblock %}
            </div>
        </header>

        <main class="flex-1 mx-auto py-6 relative z-10" style="width: min(calc(100vw - 2rem), 34rem); max-width: calc(100vw - 2rem);">
            {% block content %}{% endblock %}
        </main>

        <footer class="mx-auto py-6 text-xs text-slate-500 relative z-10 border-t border-white/5 mt-8" style="width: min(calc(100vw - 2rem), 34rem); max-width: calc(100vw - 2rem);">
            {% block footer %}
            <div class="flex items-center justify-between gap-3">
                <span>SYSTEM ACTIVE // SECURE LOCAL STORAGE</span>
                <span class="text-accent/60 font-mono tracking-widest">v1.0.4</span>
            </div>
            {% endblock %}
        </footer>
    </div>
</body>
</html>
