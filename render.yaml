services:
  - type: web
    name: iron-log
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
