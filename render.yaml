services:
  - type: web
    name: iron-log
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: iron-log-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: DATABASE_PATH
        value: /var/data/ironlog.db
